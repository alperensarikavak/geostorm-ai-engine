syntax = "proto3";

package mcp;

service SpaceDataService {
  // Fetch coronal mass ejections
  rpc GetCoronalMassEjections (CMERequest) returns (CMEResponse);
  
  // Fetch NOAA SWPC alerts
  rpc GetNoaaSwpcAlerts (AlertsRequest) returns (AlertsResponse);
}

message CMERequest {
  string start_date = 1; // YYYY-MM-DD
  string end_date = 2;   // YYYY-MM-DD
}

message CMEResponse {
  string data_json = 1;
}

message AlertsRequest {
  // No specific params needed for recent alerts based on Node server
}

message AlertsResponse {
  string data_json = 1;
}
